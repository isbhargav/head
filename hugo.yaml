---
title: "Byte Garden"
baseURL: "https://isbhargav.github.io/head/"
theme: "github.com/frjo/hugo-theme-zen/v5"
copyright: '<!--Creative Commons License-->This site is licensed under a <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC-BY-SA 4.0</a> licence.<!--/Creative Commons License-->'
languageCode: "en-GB"
defaultContentLanguage: "en"
pluralizelisttitles: false
removePathAccents: true
rssLimit: 20
pagination:
  pagerSize: 10
  path: page

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: github
  scss:
    implementation: dartsass

outputFormats:
  SearchIndex:
    mediaType: "application/json"
    baseName: "searchindex"
    isPlainText: true
    notAlternative: true

outputs:
  home: ["HTML","RSS", "JSON", "SearchIndex"]
  section: ["HTML","RSS", "JSON"]

params:
  author:
    name: "Bhargav Lad"
    url: "https://ladb.dev"
  contact: "hello@ladb.dev"
  description: "Notes, TILs, and write-ups on software, tools, and systems — Bhargav Lad's digital garden."
  dateformat: "2006-01-02"
  favicon: "favicon.ico"
  feedlinks: true
  icon: "ms-icon.png"
  image: "ms-icon.png"
  imageMaxWidth: 400
  logo: "logo.png"
  logoPath: "logo.png"
  logoWidth: 64
  logoHeight: 64
  mainSections:
    - blog
  mobileMenu: true
  poweredby: true
  realfavicongenerator: true
  sidebar: false
  submitted: true

languages:
  en:
    weight: 1
    languageName: "English"
    languageCode: "en-GB"
    contentDir: content/en
    menu:
      main:
        - Name: "Home"
          weight: -10
          pageRef: "/"
        - Name: "Blog"
          weight: 2
          pageRef: "/blog/"
        - Name: "Notes"
          weight: 6
          pageRef: "/notes/"
        - Name: "Misc"
          weight: 8
          pageRef: "/misc/"
        - Name: "Search"
          weight: 10
          pageRef: "/search/"
        - Name: "Contact"
          weight: 12
          pageRef: "/contact/"



